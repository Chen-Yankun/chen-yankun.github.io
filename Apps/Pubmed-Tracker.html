<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PubMed 文献实时追踪</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 在浏览器环境中，我们需要从全局变量 React 中提取 Hook
        const { useState, useEffect, useCallback } = React;

        // --- 以下是你提供的组件代码 (稍微调整了图标定义方式) ---
        
        const IconSearch = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconRefresh = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>;
        const IconExternalLink = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>;
        const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;

        function PubMedApp() {
            const [keywords, setKeywords] = useState(() => {
                const saved = localStorage.getItem('pubmed_keywords');
                return saved ? JSON.parse(saved) : ["chinese medicine", "obesity MASLD"];
            });
            const [activeKeyword, setActiveKeyword] = useState(keywords[0] || "");
            const [newKeyword, setNewKeyword] = useState("");
            const [articles, setArticles] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            useEffect(() => {
                localStorage.setItem('pubmed_keywords', JSON.stringify(keywords));
            }, [keywords]);

            const fetchArticles = useCallback(async (keyword) => {
                if (!keyword) return;
                setLoading(true);
                setError(null);
                try {
                    const searchUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(keyword)}&retmode=json&retmax=20&sort=date`;
                    const searchRes = await fetch(searchUrl);
                    if (!searchRes.ok) throw new Error("无法连接到 PubMed 搜索接口");
                    const searchData = await searchRes.json();
                    const pmids = searchData.esearchresult?.idlist || [];
                    
                    if (pmids.length === 0) {
                        setArticles([]);
                        setLoading(false);
                        return;
                    }

                    const summaryUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id=${pmids.join(',')}&retmode=json`;
                    const summaryRes = await fetch(summaryUrl);
                    const summaryData = await summaryRes.json();

                    const articleList = pmids.map(id => {
                        const info = summaryData.result[id];
                        if (!info) return null;
                        return {
                            id: id,
                            title: info.title || "No title available",
                            authors: info.authors ? info.authors.map(a => a.name).join(', ') : "Unknown Authors",
                            journal: info.fulljournalname || info.source || "Unknown Journal",
                            pubDate: info.pubdate || "Unknown Date",
                            doi: info.articleids?.find(aid => aid.idtype === 'doi')?.value || null,
                            link: `https://pubmed.ncbi.nlm.nih.gov/${id}/`
                        };
                    }).filter(Boolean);

                    setArticles(articleList);
                } catch (err) {
                    setError(err.message || "请求发生错误");
                } finally {
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                if (activeKeyword) fetchArticles(activeKeyword);
            }, [activeKeyword, fetchArticles]);

            const handleAddKeyword = (e) => {
                e.preventDefault();
                const trimmed = newKeyword.trim();
                if (trimmed && !keywords.includes(trimmed)) {
                    setKeywords([...keywords, trimmed]);
                    setNewKeyword("");
                    if (!activeKeyword) setActiveKeyword(trimmed);
                }
            };

            const handleRemoveKeyword = (kwToRemove) => {
                const updated = keywords.filter(kw => kw !== kwToRemove);
                setKeywords(updated);
                if (activeKeyword === kwToRemove) {
                    setActiveKeyword(updated[0] || "");
                    if (updated.length === 0) setArticles([]);
                }
            };

            return (
                <div className="flex h-screen overflow-hidden bg-slate-50 text-slate-800">
                    <style>{`
                        ::-webkit-scrollbar { width: 6px; height: 6px; }
                        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
                        .hide-scrollbar::-webkit-scrollbar { display: none; }
                    `}</style>
                    
                    {/* 左侧边栏 */}
                    <div className="w-64 bg-white border-r border-slate-200 flex flex-col hidden md:flex">
                        <div className="p-4 border-b flex items-center gap-2 text-blue-700">
                            <IconBook />
                            <h1 className="font-bold text-lg">PubMed 追踪</h1>
                        </div>
                        <div className="p-4 flex-1 overflow-y-auto">
                            <h2 className="text-xs font-semibold text-slate-400 uppercase mb-3">我的关键词</h2>
                            <ul className="space-y-1 mb-6">
                                {keywords.map(kw => (
                                    <li key={kw} className="group flex items-center justify-between relative">
                                        <button onClick={() => setActiveKeyword(kw)} className={`flex-1 text-left px-3 py-2 text-sm rounded-md ${activeKeyword === kw ? 'bg-blue-50 text-blue-700 font-medium' : 'hover:bg-slate-100'}`}>
                                            <span className="truncate block w-40">{kw}</span>
                                        </button>
                                        <button onClick={() => handleRemoveKeyword(kw)} className="absolute right-2 opacity-0 group-hover:opacity-100 p-1 text-slate-400 hover:text-red-500"><IconTrash /></button>
                                    </li>
                                ))}
                            </ul>
                            <form onSubmit={handleAddKeyword}>
                                <div className="flex bg-slate-100 rounded-md border p-1">
                                    <input type="text" value={newKeyword} onChange={(e) => setNewKeyword(e.target.value)} placeholder="添加领域..." className="bg-transparent text-sm px-2 py-1 outline-none w-full" />
                                    <button type="submit" className="text-blue-600"><IconPlus /></button>
                                </div>
                            </form>
                        </div>
                    </div>

                    {/* 右侧主内容 */}
                    <div className="flex-1 flex flex-col h-full overflow-hidden">
                        <header className="bg-white border-b px-6 py-4 flex items-center justify-between shadow-sm">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-blue-100 text-blue-600 rounded-lg"><IconSearch /></div>
                                <h2 className="text-xl font-bold">{activeKeyword ? `"${activeKeyword}"` : "请添加关键词"}</h2>
                            </div>
                            {activeKeyword && (
                                <button onClick={() => fetchArticles(activeKeyword)} className="flex items-center gap-2 px-3 py-1.5 border rounded-md hover:bg-slate-50 transition">
                                    <IconRefresh className={loading ? "animate-spin" : ""} />
                                    <span>刷新</span>
                                </button>
                            )}
                        </header>

                        <main className="flex-1 overflow-y-auto p-6">
                            <div className="max-w-4xl mx-auto space-y-4">
                                {loading ? (
                                    <div className="text-center py-20 text-slate-400">正在检索 PubMed 最新数据...</div>
                                ) : articles.map(article => (
                                    <article key={article.id} className="bg-white p-5 rounded-xl border hover:shadow-md transition group relative">
                                        <div className="absolute left-0 top-0 bottom-0 w-1 bg-blue-500 opacity-0 group-hover:opacity-100"></div>
                                        <h3 className="text-lg font-bold mb-2">
                                            <a href={article.link} target="_blank" className="hover:text-blue-600" dangerouslySetInnerHTML={{ __html: article.title }}></a>
                                        </h3>
                                        <p className="text-sm text-slate-600 mb-3 italic">{article.authors}</p>
                                        <div className="flex gap-3 text-xs font-medium">
                                            <span className="text-emerald-700 bg-emerald-50 px-2 py-1 rounded">{article.journal}</span>
                                            <span className="bg-slate-100 px-2 py-1 rounded">{article.pubDate}</span>
                                            <span className="text-slate-400">PMID: {article.id}</span>
                                        </div>
                                    </article>
                                ))}
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        // 5. 渲染组件
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PubMedApp />);
    </script>
</body>
</html>
