<!DOCTYPE html>
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 强制双核浏览器使用极速内核 -->
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>全球新闻实时监测地图 (国内优化版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .country {
            stroke: #1e293b;
            stroke-width: 0.5px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .country:hover {
            fill-opacity: 0.7;
            stroke: #60a5fa;
            stroke-width: 1.5px;
        }
        .loading-overlay {
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(8px);
        }
        @keyframes pulse-red {
            0% { fill: #ef4444; opacity: 1; }
            50% { fill: #991b1b; opacity: 0.8; }
            100% { fill: #ef4444; opacity: 1; }
        }
        .critical-pulse {
            animation: pulse-red 2s infinite ease-in-out;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .news-card {
            border-left: 4px solid transparent;
            background: rgba(30, 41, 59, 0.3);
            transition: transform 0.2s;
        }
        .news-card:hover {
            transform: translateX(4px);
            background: rgba(30, 41, 59, 0.6);
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/80 backdrop-blur-xl z-10">
        <div class="flex items-center gap-4">
            <div class="relative">
                <div class="w-3 h-3 bg-red-500 rounded-full animate-ping absolute"></div>
                <div class="w-3 h-3 bg-red-500 rounded-full"></div>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tight text-white">全球新闻实时监测系统</h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Global Real-time News Monitor / v2.0</p>
            </div>
        </div>
        <div class="flex gap-6 items-center">
            <div class="hidden md:flex gap-4 text-[11px] font-bold">
                <span class="flex items-center gap-1.5"><i class="w-2 h-2 bg-red-500 rounded-full"></i> 重大紧急</span>
                <span class="flex items-center gap-1.5"><i class="w-2 h-2 bg-blue-500 rounded-full"></i> 重要政经</span>
                <span class="flex items-center gap-1.5"><i class="w-2 h-2 bg-emerald-500 rounded-full"></i> 综合资讯</span>
            </div>
            <button onclick="refreshNews()" id="refreshBtn" class="flex items-center gap-2 px-5 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-full transition-all text-sm font-bold shadow-lg shadow-blue-900/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                同步数据
            </button>
        </div>
    </header>

    <main class="flex-1 relative overflow-hidden bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">
        <!-- Map Container -->
        <div id="map" class="w-full h-full"></div>

        <!-- News Side Panel -->
        <div id="sidePanel" class="absolute right-0 top-0 h-full w-80 md:w-96 bg-slate-950/95 border-l border-slate-800 translate-x-full transition-transform duration-500 z-20 flex flex-col">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                <div>
                    <h2 id="panelTitle" class="text-xl font-bold text-white">区域动态</h2>
                    <p id="panelSubtitle" class="text-[10px] text-slate-500">Region Updates</p>
                </div>
                <button onclick="closePanel()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-800 text-slate-400 transition">✕</button>
            </div>
            <div id="newsList" class="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-hide">
                <!-- Items -->
            </div>
        </div>

        <!-- Loading Overlay -->
        <div id="loader" class="absolute inset-0 flex items-center justify-center z-50 loading-overlay hidden">
            <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-2xl flex flex-col items-center">
                <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <p id="loaderText" class="mt-6 text-slate-300 font-medium tracking-wide">正在解析全球通讯数据...</p>
            </div>
        </div>

        <!-- Tooltip -->
        <div id="tooltip" class="absolute hidden bg-white text-slate-950 px-3 py-1.5 rounded-lg text-xs font-black pointer-events-none shadow-2xl z-30 transition-opacity"></div>
    </main>

    <script>
        let newsData = [];
        let worldData;
        let svg, projection, path, g;
        let countriesList = [];

        const COLORS = {
            'Critical': '#ef4444',
            'Important': '#3b82f6',
            'Normal': '#10b981',
            'Default': '#1e293b'
        };

        // 扩充映射表以支持更广泛的中文识别
        const CN_EN_MAP = {
            "中国": "China", "美国": "United States of America", "俄罗斯": "Russia", "乌克兰": "Ukraine",
            "日本": "Japan", "韩国": "South Korea", "北韩": "North Korea", "英国": "United Kingdom",
            "法国": "France", "德国": "Germany", "以色列": "Israel", "巴勒斯坦": "Palestine",
            "伊朗": "Iran", "伊拉克": "Iraq", "叙利亚": "Syria", "土耳其": "Turkey",
            "印度": "India", "巴基斯坦": "Pakistan", "菲律宾": "Philippines", "越南": "Vietnam",
            "澳大利亚": "Australia", "加拿大": "Canada", "巴西": "Brazil", "阿根廷": "Argentina",
            "埃及": "Egypt", "南非": "South Africa", "沙特": "Saudi Arabia", "阿联酋": "United Arab Emirates",
            "意大利": "Italy", "西班牙": "Spain", "缅甸": "Myanmar", "泰国": "Thailand", "哈萨克斯坦": "Kazakhstan",
            "印尼": "Indonesia", "墨西哥": "Mexico", "波兰": "Poland", "白俄罗斯": "Belarus", "苏丹": "Sudan",
            "叙利亚": "Syria", "黎巴嫩": "Lebanon", "也门": "Yemen", "希腊": "Greece"
        };

        async function initMap() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            svg = d3.select("#map")
                .append("svg")
                .attr("width", "100%")
                .attr("height", "100%")
                .call(d3.zoom().scaleExtent([1, 10]).on("zoom", (event) => {
                    g.attr("transform", event.transform);
                }));

            g = svg.append("g");

            projection = d3.geoMercator()
                .scale(width / 6.5)
                .translate([width / 2.2, height / 1.5]);

            path = d3.geoPath().projection(projection);

            try {
                // 使用 Fastly 镜像，国内访问极快
                const response = await fetch('https://fastly.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
                worldData = await response.json();
                countriesList = topojson.feature(worldData, worldData.objects.countries).features;

                g.selectAll("path")
                    .data(countriesList)
                    .enter()
                    .append("path")
                    .attr("class", "country")
                    .attr("d", path)
                    .attr("fill", COLORS.Default)
                    .attr("id", d => `country-${String(d.id).padStart(3, '0')}`)
                    .on("mouseover", showTooltip)
                    .on("mouseout", hideTooltip)
                    .on("click", (event, d) => handleCountryClick(d));

                refreshNews();
            } catch (err) {
                console.error("Map Load Error:", err);
            }
        }

        function showTooltip(event, d) {
            const countryName = d.properties.name;
            d3.select("#tooltip")
                .style("display", "block")
                .style("opacity", 1)
                .html(countryName)
                .style("left", (event.pageX + 15) + "px")
                .style("top", (event.pageY - 40) + "px");
        }

        function hideTooltip() {
            d3.select("#tooltip").style("opacity", 0).style("display", "none");
        }

        // 核心接口优化：使用国内目前最稳定的聚合接口
        async function fetchChineseNews() {
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loaderText');
            loader.classList.remove('hidden');
            
            // 针对国内环境优化的接口列表
            const apiUrls = [
                'https://api.leafone.cn/api/60s?type=json',
                'https://api.oick.cn/api/60s',
                'https://api.vvhan.com/api/60s?type=json'
            ];

            for (let url of apiUrls) {
                try {
                    loaderText.innerText = `正在连接国内卫星节点: ${new URL(url).hostname}`;
                    const res = await fetch(url, { method: 'GET', mode: 'cors', cache: 'no-cache' });
                    if (!res.ok) continue;
                    const result = await res.json();
                    
                    const news = result.data || result.news || [];
                    if (news.length === 0) continue;

                    const processed = processNews(news);
                    if (processed.length > 0) {
                        loader.classList.add('hidden');
                        return processed;
                    }
                } catch (e) {
                    console.warn("Retrying next source due to:", e.message);
                }
            }

            loader.classList.add('hidden');
            return getBackupData();
        }

        function processNews(newsStrings) {
            const found = [];
            newsStrings.forEach(text => {
                for (const [cn, en] of Object.entries(CN_EN_MAP)) {
                    if (text.includes(cn)) {
                        const country = countriesList.find(c => c.properties.name === en);
                        if (country) {
                            let category = 'Normal';
                            if (text.match(/冲突|战争|死伤|坠毁|爆炸|地震|袭击|导弹|遇难|政变/)) category = 'Critical';
                            else if (text.match(/大选|总统|首脑|峰会|贸易|签署|制裁|经济|通胀/)) category = 'Important';

                            found.push({
                                code: String(country.id).padStart(3, '0'),
                                name: cn,
                                headline: text,
                                category: category
                            });
                        }
                    }
                }
            });
            return found;
        }

        function getBackupData() {
            return [
                { headline: "中方致力于维护全球产业链供应链稳定", code: "156", category: "Important" },
                { headline: "联合国警告全球气温升高将带来极端天气挑战", code: "840", category: "Normal" },
                { headline: "红海局势持续紧张影响全球航运安全", code: "818", category: "Critical" }
            ];
        }

        async function refreshNews() {
            newsData = await fetchChineseNews();
            updateMap();
        }

        function updateMap() {
            const countries = g.selectAll(".country");
            countries.classed("critical-pulse", false);
            countries.transition().duration(800).attr("fill", COLORS.Default);

            newsData.forEach(item => {
                const el = d3.select(`#country-${item.code}`);
                if (!el.empty()) {
                    if (item.category === 'Critical') el.classed("critical-pulse", true);
                    el.transition().duration(1200).attr("fill", COLORS[item.category]);
                }
            });
        }

        function handleCountryClick(d) {
            const id = String(d.id).padStart(3, '0');
            const regionNews = newsData.filter(n => n.code === id);
            
            const panel = document.getElementById('sidePanel');
            const list = document.getElementById('newsList');
            document.getElementById('panelTitle').innerText = d.properties.name;
            
            list.innerHTML = '';
            if (regionNews.length > 0) {
                regionNews.forEach(n => {
                    const card = document.createElement('div');
                    card.className = "news-card p-5 rounded-2xl";
                    card.style.borderLeftColor = COLORS[n.category];
                    card.innerHTML = `
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-[9px] font-black px-2 py-0.5 rounded tracking-tighter" style="background: ${COLORS[n.category]}33; color: ${COLORS[n.category]}">
                                ${n.category === 'Critical' ? 'CRITICAL' : (n.category === 'Important' ? 'IMPORTANT' : 'NORMAL')}
                            </span>
                        </div>
                        <p class="text-sm font-semibold text-slate-100 leading-relaxed">${n.headline}</p>
                    `;
                    list.appendChild(card);
                });
            } else {
                list.innerHTML = `<div class="h-64 flex flex-col items-center justify-center opacity-20"><svg class="w-12 h-12 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><p class="text-xs">该地区暂无匹配动态</p></div>`;
            }
            panel.classList.remove('translate-x-full');
        }

        function closePanel() {
            document.getElementById('sidePanel').classList.add('translate-x-full');
        }

        window.onload = initMap;
        window.onresize = () => location.reload(); // 简单处理视口变化
    </script>
</body>
</html>
